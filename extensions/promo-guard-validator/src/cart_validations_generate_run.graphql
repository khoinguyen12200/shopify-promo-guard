query CartValidationsGenerateRunInput {
  cart {
    buyerIdentity {
      email
      phone
      customer {
        hasAnyTag(tags: ["promo-guard-redeemed"])
      }
    }
    deliveryGroups {
      deliveryAddress {
        address1
        address2
        zip
        countryCode
      }
    }
  }
  shop {
    shard: metafield(namespace: "$app", key: "shard_v2") {
      jsonValue
    }
  }
}
