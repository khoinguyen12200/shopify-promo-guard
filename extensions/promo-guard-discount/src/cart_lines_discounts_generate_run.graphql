# See: docs/function-queries-spec.md §4, §9 (Plan C — single combined shop shard)
#
# Plan C: we read the same shop-wide shard as the Validation Function
# (namespace: "$app", key: "shard_v1"), extract buyer identity from the
# cart, hash with the shard's salt, and score via `score_checkout`.
#
# Query cost fits within the 30-point Function budget — see §4 for the full
# breakdown.
query Input {
  triggeringDiscountCode

  cart {
    buyerIdentity {
      email
      phone
      customer {
        hasAnyTag(tags: ["promo-guard-redeemed"])
      }
    }

    deliveryGroups {
      deliveryAddress {
        address1
        address2
        zip
        countryCode
      }
    }
  }

  discount {
    discountClasses
  }

  shop {
    shard: metafield(namespace: "$app", key: "shard_v1") {
      jsonValue
    }
  }
}
